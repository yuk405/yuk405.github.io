<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人网站</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .profile-card {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
            width: 300px;
        }
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .info-item {
            margin: 10px 0;
            color: #666;
        }
        .info-label {
            font-weight: bold;
            color: #333;
        }
        form {
            text-align: left;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input[type="text"], input[type="tel"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="radio"] {
            margin-right: 5px;
        }
        .radio-group {
            display: flex;
            gap: 15px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        #result {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <h1>个人信息</h1>
        
        <form id="profileForm">
            <div class="form-group">
                <label for="name">名字：</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label>性别：</label>
                <div class="radio-group">
                    <label><input type="radio" name="gender" value="男" checked> 男</label>
                    <label><input type="radio" name="gender" value="女"> 女</label>
                </div>
            </div>
            <div class="form-group">
                <label for="phone">电话号码：</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            <button type="submit">提交</button>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="window.open('https://unwillingness.github.io/zhx.github.io/', '_blank')" style="padding: 8px 16px; background-color: #9c27b0; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">zhx</button>
                <button style="padding: 8px 16px; background-color: #9c27b0; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">xzc</button>
                <button style="padding: 8px 16px; background-color: #9c27b0; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">ljq</button>
            </div>
        </form>
        
        <div id="result" style="display: none;">
            <h2>您的信息</h2>
            <div class="info-item">
                <span class="info-label">名字：</span> <span id="displayName"></span>
            </div>
            <div class="info-item">
                <span class="info-label">性别：</span> <span id="displayGender"></span>
            </div>
            <div class="info-item">
                <span class="info-label">电话号码：</span> <span id="displayPhone"></span>
            </div>
            <button onclick="editInfo()" style="margin-top: 15px;">修改信息</button>
        </div>
    </div>
    
    <script>
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const gender = document.querySelector('input[name="gender"]:checked').value;
            const phone = document.getElementById('phone').value;
            
            document.getElementById('displayName').textContent = name;
            document.getElementById('displayGender').textContent = gender;
            document.getElementById('displayPhone').textContent = phone;
            
            document.getElementById('profileForm').style.display = 'none';
            document.getElementById('result').style.display = 'block';
        });
        
        function editInfo() {
            document.getElementById('result').style.display = 'none';
            document.getElementById('profileForm').style.display = 'block';
        }
    </script>
</body>
</html>
